name: Build/test package and publish to PyPI if is a tag

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - develop
  workflow_dispatch:

jobs:
  build:
    name: Build, test, and package
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Set up Fortran toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc

      - name: Set up MinGW (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-cmake
          path-type: inherit

      - name: Set up CMake (Linux/Windows)
        if: runner.os != 'macOS'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.31.6'

      - name: Set up CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install Python build tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --user build wheel

      - name: Run CTest (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build
          cmake -S . -B build
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Run CTest (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          mkdir -p build
          cmake -S . -B build -G "MinGW Makefiles"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Build Python package
        run: python3 -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions-${{ matrix.os }}
          path: dist/

  publish-to-pypi:
    name: Publish Python distribution to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/miescat/
    permissions:
      id-token: write

    steps:
      - name: Download Ubuntu dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions-ubuntu-latest
          path: dist/

      - name: Download macOS dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions-macos-latest
          path: dist/

      - name: Download Windows dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions-windows-latest
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
